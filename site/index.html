<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyraxMods - Premium Authorization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="description" content="CyraxMods - Элитный магазин игровых ключей и профессионального буста. Безопасная оплата, мгновенная доставка и 24/7 поддержка.">
    <meta name="keywords" content="MLBB, CyraxMods, Ключи, Буст, Mobile Legends, Купить ключи">
    <meta property="og:title" content="CyraxMods — Премиальный магазин ключей">
    <meta property="og:description" content="Официальные ключи и услуги буста для MLBB. Стань легендой вместе с CyraxMods.">
    <meta property="og:image" content="logo.png">
</head>
<body class="landing-page" style="overflow:hidden;">
    <main class="container" style="display:flex; align-items:center; justify-content:center; height:90vh;">
        <section class="hero glass-card" style="max-width:500px; width:100%; border-radius:24px; padding:50px;">
            <img src="logo.png" alt="CyraxMods Logo" class="site-logo" style="width:140px; margin-bottom:30px; filter: drop-shadow(0 0 15px var(--accent-purple));">
            <h1 class="hero-title" style="font-size:3rem; margin-bottom:15px;"><span class="neon-text">CYRAX</span></h1>
            <p style="color:var(--text-secondary); font-size:1.1rem; margin-bottom:40px;">Авторизуйтесь через Telegram для доступа в магазин.</p>
            
            <div id="login-section" style="margin-top:20px; display:flex; flex-direction:column; align-items:center; gap:15px;">
                <!-- Статический виджет Telegram -->
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-login="cyraxxmod_bot" 
                        data-size="large" 
                        data-radius="12" 
                        data-onauth="onTelegramAuth(user)" 
                        data-request-access="write"></script>
                
                <div style="color:var(--text-secondary); font-size:0.9rem;">или</div>

                <button id="bot-auth-btn" class="btn shimmer-btn" style="background:var(--accent-teal); color:black; width:100%; max-width:240px; font-weight:600;">
                    🤖 ВОЙТИ ЧЕРЕЗ БОТА
                </button>
            </div>

            <div id="enter-section" class="hidden" style="margin-top:20px;">
                <p style="margin-bottom:25px; color:var(--accent-teal); font-weight:600;">✅ Доступ разрешен: <span id="user-name-landing" style="color:white;"></span></p>
                <a href="shop.html" class="btn shimmer-btn" style="width:100%; font-size:1.3rem; padding: 20px;">🚀 ВОЙТИ В МАГАЗИН</a>
            </div>

            <!-- Security Badges -->
            <div class="security-badges">
                <div class="badge">
                    <span class="badge-icon">🛡️</span>
                    <span>SSL Secure</span>
                </div>
                <div class="badge">
                    <span class="badge-icon">💎</span>
                    <span>Premium Only</span>
                </div>
                <div class="badge">
                    <span class="badge-icon">✉️</span>
                    <span>Direct TG Auth</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Глобальный обработчик (должен быть доступен Telegram скрипту)
        window.onTelegramAuth = function(user) {
            console.log("Auth event received:", user);
            if (user) {
                sessionStorage.setItem('tgUser', JSON.stringify(user));
                const loginSec = document.getElementById('login-section');
                const enterSec = document.getElementById('enter-section');
                const userName = document.getElementById('user-name-landing');
                
                if (loginSec) loginSec.classList.add('hidden');
                if (enterSec) enterSec.classList.remove('hidden');
                if (userName) userName.innerText = `@${user.username || user.first_name}`;
                
                // Авто-переход через 1 секунду
                setTimeout(() => { window.location.href = 'shop.html'; }, 1000);
            }
        };

        // --- Обработка входа через бота (Plan B) ---
        async function startBotAuth() {
            const token = Math.random().toString(36).substring(2, 15);
            const botUser = 'cyraxxmod_bot';
            window.open(`https://t.me/${botUser}?start=auth_${token}`, '_blank');
            
            // Начинаем опрос сервера
            const pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`https://cyrax-shop.onrender.com/api/auth/verify?token=${token}`);
                    if (res.ok) {
                        const data = await res.json();
                        clearInterval(pollInterval);
                        onTelegramAuth(data.user);
                    }
                } catch (e) {
                    console.error("Auth poll error:", e);
                }
            }, 3000);

            // Ограничение по времени - 5 минут
            setTimeout(() => clearInterval(pollInterval), 5 * 60 * 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('tgUser'));
            if (user) {
                onTelegramAuth(user);
            }

            const botBtn = document.getElementById('bot-auth-btn');
            if (botBtn) botBtn.onclick = startBotAuth;
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
