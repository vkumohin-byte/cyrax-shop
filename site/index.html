<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyraxMods — Premium Software</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#07090D">
    <style>
        :root {
            --bg: #07090D;
            --purple: #8B5CF6;
            --teal: #10B981;
            --glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
            --dim: #94A3B8;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .lang-switcher {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .lang-btn.active {
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(123, 104, 238, 0.4);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        body{background:var(--bg);color:#F8FAFC;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

        /* Animated blobs */
        .blobs{position:fixed;inset:0;z-index:-1;filter:blur(120px);opacity:.55}
        .b1{position:absolute;width:550px;height:550px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#C026D3);top:-120px;left:-120px;animation:f1 22s infinite alternate}
        .b2{position:absolute;width:450px;height:450px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#06B6D4);bottom:-100px;right:-100px;animation:f2 18s infinite alternate-reverse}
        @keyframes f1{to{transform:translate(160px,110px) scale(1.1)}}
        @keyframes f2{to{transform:translate(-130px,-90px) scale(1.1)}}

        /* Card */
        .card{background:rgba(13,17,23,.72);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:40px;padding:70px 50px;width:90%;max-width:460px;text-align:center;box-shadow:0 50px 100px -25px rgba(0,0,0,.8);position:relative;z-index:10;animation:fadeUp .6s ease-out}
        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

        /* Logo */
        .logo-img{width:120px;height:120px;border-radius:50%;padding:4px;background:linear-gradient(135deg,var(--purple),var(--teal));box-shadow:0 0 60px rgba(139,92,246,.35);margin-bottom:2rem;object-fit:cover;cursor:pointer;transition:.4s cubic-bezier(.175,.885,.32,1.275)}
        .logo-img:hover{transform:scale(1.06) rotate(3deg)}
        .logo-img:active{transform:scale(.94)}

        /* Typography */
        h1{font-family:'Outfit',sans-serif;font-size:4rem;font-weight:800;letter-spacing:-3px;background:linear-gradient(to bottom right,#fff 40%,#94A3B8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .sub{color:var(--dim);font-size:1.05rem;font-weight:300;line-height:1.6;margin-bottom:50px}

        /* Buttons */
        .btn-main{display:flex;align-items:center;justify-content:center;width:100%;padding:20px;background:#fff;color:#000;text-decoration:none;border-radius:18px;font-weight:800;font-size:1.15rem;letter-spacing:.5px;transition:.35s cubic-bezier(.4,0,.2,1);box-shadow:0 18px 40px -10px rgba(255,255,255,.18);border:none;cursor:pointer}
        .btn-main:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 25px 50px -10px rgba(255,255,255,.25);background:#f1f5f9}
        .btn-sec{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;background:var(--glass);color:#fff;border:1px solid var(--border);border-radius:18px;font-weight:500;font-size:.95rem;cursor:pointer;transition:.25s;text-decoration:none;margin-top:12px}
        .btn-sec:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}

        /* Footer dots */
        .dots{display:flex;gap:22px;justify-content:center;margin-top:55px;opacity:.4}
        .dot-item{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:7px}
        .dot-circle{width:6px;height:6px;border-radius:50%;box-shadow:0 0 10px currentColor}
        .teal{color:var(--teal)}.purple{color:var(--purple)}

        /* Loader */
        #loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
        .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <!-- 🕸️ Background Glows & Particles -->
    <div class="bg-glow blob-1"></div>
    <div class="bg-glow blob-2"></div>
    <canvas id="particleCanvas"></canvas>

    <!-- 🌐 Language Switcher -->
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <!-- 💎 Hero Card -->
    <div class="hero-card glass-card ripple-effect" style="z-index: 10;">
        <div class="logo-container" onclick="handleLogoClick()">
            <img src="https://i.imgur.com/Gwa28uY.png" alt="Cyrax Logo" class="logo-img">
            <div class="logo-glow"></div>
        </div>
        
        <h1 class="hero-title" data-i18n="title">CYRAX</h1>
        <p class="hero-subtitle" data-i18n="subtitle">Премиум-программное обеспечение и элитный бустинг для Mobile Legends: Bang Bang</p>

        <div class="hero-actions">
            <a href="shop.html" class="btn btn-primary shimmer-btn">
                <span class="btn-icon">🚀</span> <span data-i18n="enter_store">ЗАЙТИ В МАГАЗИН</span>
            </a>
            <div class="status-indicators">
                <span class="status-dot online"></span> <span data-i18n="online">В СЕТИ</span>
                <span class="status-dot secure" style="margin-left: 15px;"></span> <span data-i18n="secure">БЕЗОПАСНЫЙ</span>
            </div>
        </div>
    </div>

    <script>
        // --- 🌐 Translations ---
        const translations = {
            ru: {
                title: 'CYRAX',
                subtitle: 'Премиум-программное обеспечение и элитный бустинг для Mobile Legends: Bang Bang',
                enter_store: 'ЗАЙТИ В МАГАЗИН',
                online: 'В СЕТИ',
                secure: 'БЕЗОПАСНЫЙ'
            },
            en: {
                title: 'CYRAX',
                subtitle: 'Premium software & elite boosting for Mobile Legends: Bang Bang',
                enter_store: 'ENTER STORE',
                online: 'ONLINE',
                secure: 'SECURE'
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            localStorage.setItem('lang', lang);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.onclick = () => setLanguage(btn.getAttribute('data-lang'));
        });

        const savedLang = localStorage.getItem('lang') || 'ru';
        setLanguage(savedLang);

        // --- 🕸️ Mouse Following Particles ("Spider Web") ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        window.onmousemove = (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        };

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

                // Mouse reaction
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < mouse.radius) {
                    this.x -= dx * 0.01;
                    this.y -= dy * 0.01;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(123, 104, 238, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        ctx.strokeStyle = `rgba(123, 104, 238, ${1 - dist/100})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        init();
        animate();

        // --- 🔐 Admin Logic ---
        let _c = 0;
        function handleLogoClick() {
            _c++;
            if (_c >= 5) {
                _c = 0;
                const pw = prompt('🔐 Admin access — enter password:');
                if (!pw) return;
                fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('adminToken', 'true');
                        window.location.href = 'shop.html';
                    } else {
                        alert('❌ Wrong password');
                    }
                })
                .catch(() => alert('⚠️ Server connection failed. Backend may be sleeping — wait 30s and retry.'));
            }
        }
        
        // --- 🌊 Loading Overlay ---
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, 800);
        };
    </script>
</body>
</html>
