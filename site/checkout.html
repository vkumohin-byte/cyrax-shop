<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyraxMods - Оформление заказа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo"><img src="logo.png" class="header-logo-img" alt="Logo">⚡️ CYRAX MODS</a>
        <a href="shop.html" style="color:var(--text-secondary); text-decoration:none;">◀ Назад в магазин</a>
    </header>

    <main class="container" style="max-width: 800px;">
        <div class="glass-card">
            <h2 style="margin-bottom: 20px; color: var(--accent-purple);">Оформление заказа</h2>
            <div id="selected-product-info" style="margin-bottom: 30px; font-size:1.2rem; font-weight:600;"></div>

            <!-- Шаг 1 -->
            <div class="form-group">
                <label>Шаг 1. Авторизация</label>
                
                <div id="telegram-login-container" style="margin-top: 15px;">
                    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="cyraxxmod_bot" data-size="large" data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
                </div>

                <div id="auth-success" class="hidden" style="color: var(--accent-teal); margin-top: 10px; font-weight: bold; background: rgba(49, 180, 180, 0.1); padding: 15px; border-radius: 8px; border: 1px solid var(--accent-teal);">
                    ✅ Профиль подтвержден: <span id="auth-id-display"></span><br>
                    <small style="color:var(--text-secondary); font-weight: normal; margin-top: 5px; display: block;">Успешная авторизация. Бот готов прислать вам заказ!</small>
                </div>
            </div>

            <!-- Шаг 2 -->
            <div class="form-group">
                <label>Шаг 2: Выберите валюту</label>
                <div class="currency-selector" id="currency-selector">
                    <div class="selector-btn" data-currency="RUB">🇷🇺 RUB</div>
                    <div class="selector-btn" data-currency="USD">🇺🇸 USD</div>
                    <div class="selector-btn" data-currency="EUR">🇪🇺 EUR</div>
                    <div class="selector-btn" data-currency="UAH">🇺🇦 UAH</div>
                </div>
            </div>

            <!-- Шаг 3 -->
            <div class="form-group hidden" id="method-group">
                <label>Шаг 3: Выберите метод оплаты</label>
                <div class="method-selector" id="method-selector">
                    <!-- Заполняется через JS -->
                </div>
            </div>

            <!-- Шаг 4 -->
            <div class="form-group hidden" id="details-group">
                <label>Шаг 4: Реквизиты для оплаты</label>
                <div class="payment-details" id="payment-details">
                    <!-- Заполняется через JS -->
                </div>
            </div>

            <!-- Шаг 5 -->
            <div class="form-group hidden" id="submit-group" style="margin-top: 40px;">
                <button type="button" class="btn" id="pay-btn" style="width: 100%;">
                    <div class="loader"></div>
                    ✅ Я оплатил
                </button>
            </div>
            
            <div id="error-message" style="color: #ff6b6b; margin-top: 15px; text-align: center;" class="hidden"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
